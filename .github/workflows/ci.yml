name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck Web
        run: cd apps/web && npm run type-check

  # test-unit desabilitado — adicionar testes unitários antes de reativar

  # test-integration desabilitado — adicionar testes de integração antes de reativar

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build shared package
        run: cd packages/shared && npm run build

      - name: Gera Prisma Client
        run: cd apps/api && npx prisma generate

      - name: Build API (TypeScript)
        run: cd apps/api && npm run build

      - name: Build Web (Next.js)
        run: cd apps/web && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1

  test-e2e:
    name: Testes E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [build-check]
    if: false  # desabilitado até configurar ambiente E2E no CI

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: presente
          POSTGRES_PASSWORD: presente_test
          POSTGRES_DB: presente_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://presente:presente_test@localhost:5432/presente_e2e
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: e2e-secret-ci-only
      NODE_ENV: test
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Instala browsers Playwright
        run: cd apps/web && npx playwright install --with-deps chromium

      - name: Gera Prisma Client e aplica migrações
        run: |
          cd apps/api
          npx prisma generate
          npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://presente:presente_test@localhost:5432/presente_e2e

      - name: Sobe API em background
        run: cd apps/api && npm run build && node dist/server.js &
        env:
          PORT: 3001

      - name: Build e sobe Next.js em background
        run: cd apps/web && npm run build && npm start &
        env:
          PORT: 3000

      - name: Aguarda serviços ficarem prontos
        run: |
          npx wait-on http://localhost:3001/health http://localhost:3000 --timeout 60000

      - name: Roda testes E2E
        run: cd apps/web && npm run test:e2e
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_GUARDIAN_EMAIL: ${{ secrets.E2E_GUARDIAN_EMAIL }}
          E2E_GUARDIAN_PASSWORD: ${{ secrets.E2E_GUARDIAN_PASSWORD }}

      - name: Upload relatório Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
