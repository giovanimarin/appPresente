name: Deploy — Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy para Produção
    runs-on: ubuntu-latest
    environment: production   # requer aprovação manual configurada no GitHub

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necessário para acessar HEAD^2 do merge commit

      - name: Extrai SHA do commit de staging
        id: staging
        run: |
          # HEAD^2 = segundo parent do merge commit = tip do branch staging
          SHA=$(git rev-parse HEAD^2)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Lê versão do package.json
        id: version
        run: |
          VERSION="v$(jq -r '.version' package.json)"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Configura credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            sa-east-1

      - name: Login no ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Promove imagem de staging para produção (sem rebuild)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          STAGING_SHA:  ${{ steps.staging.outputs.sha }}
          VERSION:      ${{ steps.version.outputs.tag }}
        run: |
          docker pull $ECR_REGISTRY/presente/api:$STAGING_SHA
          docker tag  $ECR_REGISTRY/presente/api:$STAGING_SHA \
                      $ECR_REGISTRY/presente/api:$VERSION
          docker push $ECR_REGISTRY/presente/api:$VERSION

      - name: Cria tag de versão no git
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $VERSION
          git push origin $VERSION

      - name: Deploy no servidor de Produção via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PRODUCTION_HOST }}
          username: ubuntu
          key:      ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            /opt/presente/deploy.sh ${{ steps.version.outputs.tag }}

      - name: Smoke test de produção
        run: |
          sleep 15
          curl -f https://api.apppresente.com.br/health || exit 1

      - name: Cria GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ steps.version.outputs.tag }}
          name:                   "Presente ${{ steps.version.outputs.tag }}"
          generate_release_notes: true

      # Frontend: Vercel detecta push no branch main e faz deploy automático

  # Build mobile removido do deploy automático.
  # Disparar manualmente via: Actions → Mobile — Build Manual
