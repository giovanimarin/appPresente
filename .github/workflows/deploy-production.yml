name: Deploy — Production

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    name: Deploy para Produção
    runs-on: ubuntu-latest
    environment: production   # requer aprovação manual configurada no GitHub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Extrai versão da tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Configura credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            sa-east-1

      - name: Login no ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push da imagem Docker
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          VERSION:       ${{ steps.tag.outputs.version }}
          SHA:           ${{ github.sha }}
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t $ECR_REGISTRY/presente/api:$VERSION \
            -t $ECR_REGISTRY/presente/api:$SHA \
            -t $ECR_REGISTRY/presente/api:latest \
            .
          docker push $ECR_REGISTRY/presente/api:$VERSION
          docker push $ECR_REGISTRY/presente/api:$SHA
          docker push $ECR_REGISTRY/presente/api:latest

      - name: Deploy no servidor de Produção via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PRODUCTION_HOST }}
          username: ubuntu
          key:      ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            /opt/presente/deploy.sh ${{ github.sha }}

      - name: Smoke test de produção
        run: |
          sleep 15
          curl -f https://api.presente.app/health || exit 1

      - name: Deploy do Web em Produção (Vercel)
        run: npx vercel --token=${{ secrets.VERCEL_TOKEN }} --prod
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: apps/web

      - name: Cria GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.tag.outputs.version }}
          name:       "Presente ${{ steps.tag.outputs.version }}"
          generate_release_notes: true
