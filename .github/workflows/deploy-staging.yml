name: Deploy — Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy para Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configura credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            sa-east-1

      - name: Login no ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push da imagem Docker
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t $ECR_REGISTRY/presente/api:${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/presente/api:${{ github.sha }}

      - name: Deploy no servidor de Staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ubuntu
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            /opt/presente/deploy.sh ${{ github.sha }}

      - name: Smoke test
        continue-on-error: true
        run: |
          sleep 20
          curl -f https://staging-api.apppresente.com.br/health

      # Frontend: Vercel detecta push no branch staging e faz deploy automático

  build-mobile:
    name: Build Mobile — Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instala dependências do mobile
        working-directory: apps/mobile
        run: npm install

      - name: Build EAS Android (preview — distribuição interna)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli build --profile preview --platform android --non-interactive
